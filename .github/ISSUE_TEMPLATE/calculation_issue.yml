name: Calculation / model issue
description: A financial calculation, tax value, or optimizer output is wrong
labels: ["calculation"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template when the app runs without errors but produces a **numerically incorrect** value — tax, contribution room, RESP grant, optimizer allocation, mortgage amortization, etc.

  - type: dropdown
    id: domain
    attributes:
      label: Financial domain
      options:
        - RESP
        - TFSA
        - RRSP
        - Non-registered account
        - Real Estate
        - Mortgage
        - CPP
        - OAS
        - Child Care Benefit
        - Life Insurance
        - Disability Insurance
        - DB Pension
        - Tax Engine
        - Cash Flow
        - Gurobi Optimizer
        - Risk / Monte Carlo
        - Other
    validations:
      required: true

  - type: input
    id: expected_value
    attributes:
      label: Expected value
      placeholder: e.g., RESP grant for $2,500 contribution = $500 (20% CESG)
    validations:
      required: true

  - type: input
    id: actual_value
    attributes:
      label: Actual value produced by the app
      placeholder: e.g., $450
    validations:
      required: true

  - type: textarea
    id: inputs
    attributes:
      label: Inputs / scenario
      description: Minimal set of inputs to reproduce — client age, contribution amount, year, province, etc.
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: Authoritative reference
      description: CRA form, tax act section, academic source, or existing test case that defines the correct answer.
      placeholder: e.g., CRA T1 line 12900; CESG rules at Canada.ca/RESP

  - type: dropdown
    id: optimizer_involved
    attributes:
      label: Does Gurobi optimizer influence this value?
      options:
        - "No — deterministic calculation"
        - "Yes — value depends on optimizer output"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Any related data tables (mortality, tax brackets) suspected to be stale?
